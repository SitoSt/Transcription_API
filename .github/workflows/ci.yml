name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libboost-dev libssl-dev

      - name: Configure (tests only, no server)
        run: |
          cmake -B build \
            -DBUILD_TESTS=ON \
            -DBUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build unit_tests
        run: cmake --build build --target unit_tests -j$(nproc)

      - name: Run unit tests
        run: ./build/tests/unit_tests --gtest_output=xml:test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

